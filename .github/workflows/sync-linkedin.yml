name: Sync LinkedIn Posts

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync-linkedin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch LinkedIn posts and rebuild
        env:
          LINKEDIN_POSTS_URL: ${{ secrets.LINKEDIN_POSTS_URL }}
        run: node .github/scripts/sync-linkedin.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet content/posts/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/ index.html
          git commit -m "chore: sync LinkedIn posts [automated]"
          git push
